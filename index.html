<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base id="markdown-base" href="./" />
    <title>UGK Markdown</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">
          <span class="brand-mark">UGK</span>
          <span class="brand-name">Markdown Reader</span>
        </div>
        <div id="file-wrap">
          <span>Current file</span>
          <strong id="file">No file opened</strong>
        </div>
        <div id="toolbar" role="toolbar" aria-label="Reader tools">
          <button id="open" class="primary">Open Markdown</button>
          <button id="compare">Compare</button>
          <button id="theme" aria-label="Toggle theme">Dark</button>
        </div>
      </header>
      <main>
        <div id="empty">Open a local .md file to read it.</div>
        <div id="reader">
          <section id="source-pane">
            <div class="pane-title">Source Editor</div>
            <textarea id="source" spellcheck="false"></textarea>
          </section>
          <section id="render-pane">
            <div class="pane-title">Rendered</div>
            <article id="viewer" class="markdown-body"></article>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
