<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base id="markdown-base" href="./" />
    <title>UGK Markdown</title>
  </head>
  <body>
    <div id="app" data-drop-label="Drop Markdown file">
      <header id="topbar">
        <div class="brand">
          <span class="brand-mark">UGK</span>
          <span class="brand-name" data-i18n="app.brand">Markdown Reader</span>
        </div>
        <div id="file-wrap">
          <span data-i18n="file.caption">Current file</span>
          <strong id="file" data-i18n="file.empty">No file opened</strong>
        </div>
        <div id="toolbar" role="toolbar" aria-label="Reader tools" data-i18n-aria-label="toolbar.label">
          <button id="open" class="primary" data-i18n="open.button">Open Markdown</button>
          <button id="compare" data-i18n="compare.compare" disabled>Compare</button>
          <button id="theme" aria-label="Toggle theme" data-i18n="theme.dark" data-i18n-aria-label="theme.aria">Dark</button>
        </div>
      </header>
      <main>
        <div id="empty" data-i18n="empty.message">Drag a Markdown file here</div>
        <template id="reader-template">
          <section id="source-pane">
            <div class="pane-title" data-i18n="source.title">Source Editor</div>
            <textarea id="source" spellcheck="false"></textarea>
          </section>
          <section id="render-pane">
            <div class="pane-title" data-i18n="rendered.title">Rendered</div>
            <article id="viewer" class="markdown-body"></article>
          </section>
        </template>
      </main>
    </div>
    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
